<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f5f5f5;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            background: linear-gradient(135deg, hsl(15.1111, 55.5556%, 52.3529%) 0%, hsl(15.1111, 65%, 45%) 100%);
            padding: 40px 30px;
            text-align: center;
        }
        .header-icon {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .header-icon svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
        }
        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }
        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-top: 5px;
        }
        .content {
            padding: 40px 30px;
        }
        .content h2 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .content p {
            color: #555555;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid hsl(15.1111, 55.5556%, 52.3529%);
            padding: 15px 20px;
            margin: 25px 0;
            border-radius: 4px;
        }
        .info-box strong {
            color: #1a1a1a;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, hsl(15.1111, 55.5556%, 52.3529%) 0%, hsl(15.1111, 65%, 45%) 100%);
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
            box-shadow: 0 4px 12px rgba(222, 103, 62, 0.3);
            transition: all 0.3s ease;
        }
        .cta-button:hover {
            box-shadow: 0 6px 16px rgba(222, 103, 62, 0.4);
            transform: translateY(-2px);
        }
        .footer {
            background-color: #f8f9fa;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        .footer p {
            color: #6b7280;
            font-size: 14px;
            margin: 5px 0;
        }
        .footer a {
            color: hsl(15.1111, 55.5556%, 52.3529%);
            text-decoration: none;
        }
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 30px 0;
        }
        @media only screen and (max-width: 600px) {
            .content {
                padding: 30px 20px;
            }
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 24px;
            }
            .cta-button {
                display: block;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1>ThreatAtlas</h1>
            <p>Security Threat Modeling Platform</p>
        </div>

        <!-- Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <!-- Footer -->
        <div class="footer">
            <p><strong>ThreatAtlas</strong></p>
            <p>Professional Threat Modeling Made Simple</p>
            <div class="divider" style="margin: 20px 0;"></div>
            <p style="color: #9ca3af; font-size: 12px;">
                This is an automated email from ThreatAtlas. Please do not reply to this email.
            </p>
        </div>
    </div>
</body>
</html>
